groups:
  - name: supportlayer-phase5
    rules:
      - alert: RagHighP95Latency
        expr: histogram_quantile(0.95, sum(rate(rag_request_duration_seconds_bucket[5m])) by (le)) > 8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RAG p95 latency is above 8 seconds"
          description: "RAG p95 latency has exceeded the Phase 5 target for at least 5 minutes."

      - alert: RagErrorRateSpike
        expr: (sum(rate(rag_requests_total{status="error"}[5m])) / clamp_min(sum(rate(rag_requests_total[5m])), 0.001)) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "RAG error rate spike"
          description: "RAG error ratio is above 5% for at least 5 minutes."

      - alert: RagLlmErrorsBurst
        expr: sum(increase(rag_llm_errors_total[5m])) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "LLM error burst detected"
          description: "More than 10 LLM errors were recorded within 5 minutes."

      - alert: ServiceDown
        expr: up{job=~"rag-python|api-portal|api-public|api-admin|qdrant"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Prometheus cannot scrape {{ $labels.job }} for at least 2 minutes."
