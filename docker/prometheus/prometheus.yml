global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: rag-python
    static_configs:
      - targets: ["host.docker.internal:8000"]

  - job_name: api-portal
    static_configs:
      - targets: ["host.docker.internal:5001"]

  - job_name: api-public
    static_configs:
      - targets: ["host.docker.internal:5000"]

  - job_name: api-admin
    static_configs:
      - targets: ["host.docker.internal:5002"]

  - job_name: qdrant
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:6335"]
