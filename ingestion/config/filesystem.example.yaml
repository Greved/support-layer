collection: documents
sources:
  - "data/**/*.pdf"
  - "data/**/*.html"
  - "data/**/*.md"
  - "data/**/*.txt"

# Optional base directory for resolving relative glob patterns (defaults to this file's directory)
# base_dir: "../"

chunking:
  split_by: word
  split_length: 128
  split_overlap: 32

# Optional directory to store cleaned, pre-split documents for debugging/reproducibility.
artifacts_dir: "artifacts/ingestion"
