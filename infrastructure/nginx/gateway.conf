worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;

    # Rate-limit keys:
    # - public widget traffic: API key when present, otherwise client IP
    # - portal/admin: client IP
    map $http_x_api_key $public_rate_key {
        default $http_x_api_key;
        ""      $binary_remote_addr;
    }

    limit_req_zone $public_rate_key zone=public_widget:20m rate=120r/m;
    limit_req_zone $binary_remote_addr zone=portal_users:10m rate=60r/s;
    limit_req_zone $binary_remote_addr zone=admin_users:10m rate=30r/s;

    upstream api_public {
        server host.docker.internal:5000;
        keepalive 32;
    }

    upstream api_portal {
        server host.docker.internal:5001;
        keepalive 32;
    }

    upstream api_admin {
        server host.docker.internal:5002;
        keepalive 32;
    }

    server {
        listen 8088;
        server_name _;

        # Widget/public API: stricter per-key throttling
        location /v1/ {
            limit_req zone=public_widget burst=40 nodelay;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_pass http://api_public;
        }

        # Tenant portal API
        location /portal/ {
            limit_req zone=portal_users burst=120 nodelay;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_pass http://api_portal;
        }

        # Admin API
        location /admin/ {
            limit_req zone=admin_users burst=30 nodelay;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_pass http://api_admin;
        }
    }
}
