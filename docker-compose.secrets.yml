services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: supportlayer
      POSTGRES_USER: supportlayer
      POSTGRES_PASSWORD: ""
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supportlayer"]
      interval: 10s
      timeout: 5s
      retries: 5
    secrets:
      - postgres_password

  app:
    image: python:3.11-slim
    container_name: rag-app
    working_dir: /code
    volumes:
      - .:/code
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      LLAMA_LLM_URL: http://llama-llm:8080/v1
      LLAMA_EMBEDDING_URL: http://llama-embed:8081/v1
      DATABASE_URL_FILE: /run/secrets/database_url
      INTERNAL_SECRET_FILE: /run/secrets/internal_secret
      GEMINI_API_KEY_FILE: /run/secrets/gemini_api_key
      QDRANT_API_KEY_FILE: /run/secrets/qdrant_api_key
      REDIS_URL_FILE: /run/secrets/redis_url
    command: /bin/bash -lc "pip install --no-cache-dir . && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      qdrant:
        condition: service_healthy
      llama-llm:
        condition: service_healthy
      llama-embed:
        condition: service_healthy
      postgres:
        condition: service_healthy
    secrets:
      - database_url
      - internal_secret
      - gemini_api_key
      - qdrant_api_key
      - redis_url

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  database_url:
    file: ./secrets/database_url.txt
  internal_secret:
    file: ./secrets/internal_secret.txt
  gemini_api_key:
    file: ./secrets/gemini_api_key.txt
  qdrant_api_key:
    file: ./secrets/qdrant_api_key.txt
  redis_url:
    file: ./secrets/redis_url.txt

volumes:
  postgres_data:
