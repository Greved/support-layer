version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__STORAGE__STORAGE_PATH: /qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  llama-embed:
    image: ghcr.io/ggerganov/llama.cpp:server
    container_name: llama-embed
    command: ["server", "-m", "/models/embedding/bge-large-en-v1.5-q8_0.gguf", "-c", "2048", "--threads", "8", "--port", "8081", "--host", "0.0.0.0", "--embedding", "--api"]
    ports:
      - "8081:8081"
    volumes:
      - ./models/embedding:/models/embedding:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  llama-llm:
    image: ghcr.io/ggerganov/llama.cpp:server
    container_name: llama-llm
    command: ["server", "-m", "/models/llm/Qwen3-4B-Q4_K_M.gguf", "-c", "4096", "--threads", "8", "--port", "8080", "--host", "0.0.0.0", "--api"]
    ports:
      - "8080:8080"
    volumes:
      - ./models/llm:/models/llm:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  default:
    name: ragnet
    driver: bridge

volumes:
  qdrant_data:
    driver: local
