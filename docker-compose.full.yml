version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__STORAGE__STORAGE_PATH: /qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  llama-embed:
    image: ghcr.io/ggerganov/llama.cpp:full
    container_name: llama-embed
    command: >
      /bin/bash -lc "server -m /models/embedding/bge-large-en-v1.5-gguf -c 2048 --threads 8 --port 8081 --host 0.0.0.0 --embedding --api"
    ports:
      - "8081:8081"
    volumes:
      - ./models/embedding:/models/embedding:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  llama-llm:
    image: ghcr.io/ggerganov/llama.cpp:full
    container_name: llama-llm
    command: >
      /bin/bash -lc "server -m /models/llm/qwen-3-4b-instruct-q4_0.gguf -c 4096 --threads 8 --port 8080 --host 0.0.0.0 --api"
    ports:
      - "8080:8080"
    volumes:
      - ./models/llm:/models/llm:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: python:3.11-slim
    container_name: rag-app
    working_dir: /code
    volumes:
      - .:/code
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      LLAMA_LLM_URL: http://llama-llm:8080/v1
      LLAMA_EMBEDDING_URL: http://llama-embed:8081/v1
    command: /bin/bash -lc "pip install --no-cache-dir . && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      qdrant:
        condition: service_healthy
      llama-llm:
        condition: service_healthy
      llama-embed:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  default:
    name: ragnet
    driver: bridge

volumes:
  qdrant_data:
    driver: local
