version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6335:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__STORAGE__STORAGE_PATH: /qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  llama-embed:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llama-embed
    command: ["-m", "/models/embedding/bge-large-en-v1.5-q8_0.gguf", "-c", "2048", "--threads", "8", "--port", "8081", "--host", "0.0.0.0", "--embedding", "-ub", "2048", "--ctx-size", "512"]
    ports:
      - "8081:8081"
    volumes:
      - ./models/embedding:/models/embedding:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  llama-llm:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llama-llm
    command: ["-m", "/models/llm/Qwen3-4B-Q4_K_M.gguf", "-c", "4096", "--threads", "8", "--port", "8080", "--host", "0.0.0.0"]
    ports:
      - "8082:8080"
    volumes:
      - ./models/llm:/models/llm:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  app:
    image: python:3.11-slim
    container_name: rag-app
    working_dir: /code
    volumes:
      - .:/code
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      LLAMA_LLM_URL: http://llama-llm:8080/v1
      LLAMA_EMBEDDING_URL: http://llama-embed:8081/v1
    command: /bin/bash -lc "pip install --no-cache-dir . && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      qdrant:
        condition: service_healthy
      llama-llm:
        condition: service_healthy
      llama-embed:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  default:
    name: ragnet
    driver: bridge

volumes:
  qdrant_data:
    driver: local
